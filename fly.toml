app = "morningshow"
primary_region = "ams"

[http_service]
  internal_port = 3000 # Standard Next.js port
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512 # Increased to 512MB for stability

[[mounts]]
  source = "morningshow_data"
  destination = "/data/volume"
